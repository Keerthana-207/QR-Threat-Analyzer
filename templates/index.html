{% extends "base.html" %}

{% block content %}
    <div class="dashboard-grid">
        <div class="card stat-card">
            <h3>Total QR Codes Scanned</h3>
            <p class="stat-number">{{ summary.total }}</p>
        </div>
        <div class="card stat-card">
            <h3>Malicious / Phishing Found</h3>
            <p class="stat-number dangerous">{{ summary.malicious }}</p>
        </div>
        <div class="card stat-card">
            <h3>Suspicious / Review</h3>
            <p class="stat-number warning">{{ summary.suspicious }}</p>
        </div>
        <div class="card stat-card">
            <h3>Clean / Verified</h3>
            <p class="stat-number secure">{{ summary.clean }}</p>
        </div>
    </div>
{% endblock %}
