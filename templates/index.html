<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Threat Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f0f6fc;
            --text-muted: #8b949e;

            /* Cybersecurity Accent Colors */
            --accent-primary: #58a6ff;
            --safe-neon: #39ff14;
            --safe-bg: rgba(57, 255, 20, 0.1);
            --warning-neon: #ffaa00;
            --warning-bg: rgba(255, 170, 0, 0.1);
            --danger-neon: #ff3333;
            --danger-bg: rgba(255, 51, 51, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Subtle matrix grid mesh layer */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 600px;
            z-index: 10;
        }

        /* Header Section */
        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
            background: linear-gradient(180deg, #ffffff 0%, #8b949e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            max-width: 480px;
            margin: 0 auto;
        }

        /* Glassmorphism Platform Card */
        .card {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: border 0.3s ease;
        }

        /* Front Page QR Tech Illustration */
        .hero-illustration {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2rem;
            position: relative;
            padding: 1rem;
        }

        .qr-graphic-box {
            width: 160px;
            height: 160px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-graphic-box svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: var(--text-main);
            opacity: 0.85;
        }

        /* Static Hero Sweep Line Element */
        .hero-laser {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            box-shadow: 0 0 8px 1px var(--accent-primary);
            animation: sweep 3s ease-in-out infinite;
        }

        /* Mode Selection Buttons */
        .mode-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 1rem;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #1f6feb 0%, #114494 100%);
            border: none;
            box-shadow: 0 4px 12px rgba(31, 111, 235, 0.2);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #388bfd 0%, #1f6feb 100%);
            box-shadow: 0 6px 16px rgba(31, 111, 235, 0.35);
        }

        /* Live Camera Workspace Area */
        .workspace {
            display: none;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            position: relative;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
            aspect-ratio: 4/3;
        }

        #reader {
            width: 100% !important;
            height: 100% !important;
        }

        #reader video {
            object-fit: cover !important;
        }

        /* ==================== SCANNING ANIMATION GRAPHICS ==================== */
        .scanner-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Laser Sweep Line Element */
        .laser-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            box-shadow: 0 0 12px 2px var(--accent-primary);
            animation: sweep 2.5s ease-in-out infinite;
        }

        /* Target Frame HUD box */
        .scan-frame {
            width: 70%;
            height: 70%;
            border: 2px dashed rgba(88, 166, 255, 0.25);
            position: relative;
            box-sizing: border-box;
        }

        /* Tech Corner Framing Accents */
        .scan-frame::before, .scan-frame::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid var(--accent-primary);
        }

        /* Top Left and Bottom Right Corners */
        .scan-frame::before {
            top: -3px;
            left: -3px;
            border-right: none;
            border-bottom: none;
        }

        .scan-frame::after {
            bottom: -3px;
            right: -3px;
            border-left: none;
            border-top: none;
        }

        /* Auxiliary Corner Element to fill remaining sides */
        .scan-frame-corners {
            position: absolute;
            inset: 0;
        }

        .scan-frame-corners::before, .scan-frame-corners::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid var(--accent-primary);
        }

        /* Top Right and Bottom Left Corners */
        .scan-frame-corners::before {
            top: -3px;
            right: -3px;
            border-left: none;
            border-bottom: none;
        }

        .scan-frame-corners::after {
            bottom: -3px;
            left: -3px;
            border-right: none;
            border-top: none;
        }

        @keyframes sweep {
            0% { top: 0%; opacity: 0.2; }
            50% { top: 100%; opacity: 1; }
            100% { top: 0%; opacity: 0.2; }
        }
        /* ===================================================================== */

        /* Hidden File Architecture */
        #file-input {
            display: none;
        }

        /* Upload Preview Area */
        .upload-preview-container {
            display: none;
            margin-bottom: 1.5rem;
            text-align: center;
            border: 1px dashed var(--border-color);
            padding: 1rem;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
        }

        .upload-preview-container img {
            max-width: 100%;
            max-height: 220px;
            border-radius: 8px;
        }

        /* Loading / Scanning Pulse State */
        .loader-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
            gap: 1rem;
        }

        .pulse-ring {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(88, 166, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-primary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-container p {
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }

        /* Threat Engine Results Dashboard */
        .results-panel {
            display: none;
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
            margin-top: 0.5rem;
        }

        .result-row {
            margin-bottom: 1.25rem;
        }

        .result-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 0.35rem;
        }

        .result-value {
            font-size: 1rem;
            word-break: break-all;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .badge-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .badge {
            display: flex;
            flex-direction: column;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-weight: 600;
        }

        .badge-status.safe { background: var(--safe-bg); color: var(--safe-neon); border: 1px solid rgba(57, 255, 20, 0.2); }
        .badge-status.suspicious { background: var(--warning-bg); color: var(--warning-neon); border: 1px solid rgba(255, 170, 0, 0.2); }
        .badge-status.malicious { background: var(--danger-bg); color: var(--danger-neon); border: 1px solid rgba(255, 51, 51, 0.2); }

        .score-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .action-container {
            margin-top: 1.5rem;
        }

        /* Responsive Breakpoints */
        @media (max-width: 480px) {
            h1 { font-size: 1.75rem; }
            .card { padding: 1.25rem; }
            .mode-selection { grid-template-columns: 1fr; gap: 0.75rem; }
            .badge-grid { grid-template-columns: 1fr; gap: 0.75rem; }
            .qr-graphic-box { width: 130px; height: 130px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>QR Threat Analyzer</h1>
            <p>Scan or upload a QR code to detect malicious links, phishing attempts, and suspicious redirects.</p>
        </header>

        <main class="card" id="main-panel">

            <div class="hero-illustration" id="front-hero">
                <div class="qr-graphic-box">
                    <div class="hero-laser"></div>
                    <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3h4v4H3zM4 4h2v2H4z" />
                        <path d="M17 3h4v4h-4zM18 4h2v2h-2z" />
                        <path d="M3 17h4v4H3zM4 18h2v2H4z" />
                        <path d="M9 3h2M13 3h2M9 5h4M11 7h2M3 9v2M5 13v2M7 9v4M9 9h2v2H9zM13 10h4v2h-4zM19 9h2v4h-2zM9 13h2M13 13v2M15 15h2M19 15h2M9 17h2v4H9zM13 17h4M13 19h2M17 19v2M21 18v3" />
                    </svg>
                </div>
            </div>

            <div class="mode-selection" id="action-shelf">
                <button class="btn btn-primary" id="start-scan-btn">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                    Scan QR
                </button>
                <button class="btn" id="upload-trigger-btn">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                    Upload QR
                </button>
            </div>

            <input type="file" id="file-input" accept="image/*">

            <div class="workspace" id="video-workspace">
                <div class="scanner-overlay">
                    <div class="laser-line"></div>
                    <div class="scan-frame">
                        <div class="scan-frame-corners"></div>
                    </div>
                </div>
                <div id="reader"></div>
            </div>

            <div class="upload-preview-container" id="preview-wrapper">
                <img id="upload-preview" src="#" alt="QR Code Preview">
            </div>

            <div class="loader-container" id="loading-pipeline">
                <div class="pulse-ring"></div>
                <p>RUNNING HEURISTIC THREAT ANALYSIS...</p>
            </div>

            <div class="results-panel" id="results-display">
                <div class="result-row">
                    <div class="result-label">Decoded Payload Target</div>
                    <div class="result-value" id="res-payload">None</div>
                </div>

                <div class="badge-grid">
                    <div class="badge" id="status-card">
                        <span class="result-label" style="color: inherit; opacity: 0.7;">Threat Matrix Verdict</span>
                        <span style="font-size: 1.2rem; margin-top: 0.25rem;" id="res-verdict">Clear</span>
                    </div>
                    <div class="badge" id="score-card" style="background: rgba(255,255,255,0.02); border: 1px solid var(--border-color);">
                        <span class="result-label">Risk Rating Score</span>
                        <span class="score-value" id="res-score">0 / 100</span>
                    </div>
                </div>

                <div class="action-container">
                    <button class="btn btn-primary" style="width: 100%;" id="reset-btn">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                        Scan / Upload Again
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // DOM Element Mapping
        const startScanBtn = document.getElementById('start-scan-btn');
        const uploadTriggerBtn = document.getElementById('upload-trigger-btn');
        const fileInput = document.getElementById('file-input');
        const videoWorkspace = document.getElementById('video-workspace');
        const previewWrapper = document.getElementById('preview-wrapper');
        const uploadPreview = document.getElementById('upload-preview');
        const loadingPipeline = document.getElementById('loading-pipeline');
        const resultsDisplay = document.getElementById('results-display');
        const actionShelf = document.getElementById('action-shelf');
        const mainPanel = document.getElementById('main-panel');
        const resetBtn = document.getElementById('reset-btn');
        const frontHero = document.getElementById('front-hero');

        const resPayload = document.getElementById('res-payload');
        const resVerdict = document.getElementById('res-verdict');
        const resScore = document.getElementById('res-score');
        const statusCard = document.getElementById('status-card');

        let html5QrCode;

        // Initialize the Scanner Instantiation
        function initScanner() {
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }
        }

        // Action: Live Scanner Activation
        startScanBtn.addEventListener('click', async () => {
            initScanner();
            frontHero.style.display = 'none';
            actionShelf.style.display = 'none';
            videoWorkspace.style.display = 'block';
            mainPanel.style.borderColor = 'var(--accent-primary)';

            const config = { fps: 10, qrbox: (width, height) => { return { width: width * 0.7, height: height * 0.7 } } };

            try {
                await html5QrCode.start(
                    { facingMode: "environment" },
                    config,
                    (decodedText) => {
                        stopScanner();
                        processScanOutput(decodedText);
                    },
                    (errorMessage) => { /* Silently consume ongoing frame search misses */ }
                );
            } catch (err) {
                alert("Camera Access Failure: " + err);
                resetToDefault();
            }
        });

        // Action: Trigger Native Upload
        uploadTriggerBtn.addEventListener('click', () => {
            fileInput.click();
        });

        // File Selection Capture Pipeline
        fileInput.addEventListener('change', e => {
            if (e.target.files.length === 0) return;

            const file = e.target.files[0];
            frontHero.style.display = 'none';
            actionShelf.style.display = 'none';

            // Show Image Render Preview Component
            const reader = new FileReader();
            reader.onload = function(event) {
                uploadPreview.src = event.target.result;
                previewWrapper.style.display = 'block';

                // Fire off immediate static file analytics
                executeStaticFileScan(file);
            };
            reader.readAsDataURL(file);
        });

        // Static File Analytics Processing Loop
        function executeStaticFileScan(file) {
            initScanner();
            loadingPipeline.style.display = 'flex';

            setTimeout(() => {
                html5QrCode.scanFile(file, true)
                .then(decodedText => {
                    loadingPipeline.style.display = 'none';
                    processScanOutput(decodedText);
                })
                .catch(err => {
                    loadingPipeline.style.display = 'none';
                    alert("Scanning Failed: Valid QR payload structure not found inside file.");
                    resetToDefault();
                });
            }, 800);
        }

        // Close Active Camera Feeds safely
        function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    videoWorkspace.style.display = 'none';
                });
            } else {
                videoWorkspace.style.display = 'none';
            }
        }

        // Heuristic Threat Logic Assessment Modeler
        function processScanOutput(payload) {
            videoWorkspace.style.display = 'none';
            loadingPipeline.style.display = 'flex';

            setTimeout(() => {
                loadingPipeline.style.display = 'none';
                resPayload.textContent = payload;

                let score = 0;
                let verdict = "SAFE";
                let threatClass = "safe";

                const lowerPayload = payload.toLowerCase();

                if (lowerPayload.includes("bit.ly") || lowerPayload.includes("t.co") || lowerPayload.includes("redirect") || lowerPayload.includes("login")) {
                    score = Math.floor(Math.random() * (75 - 40 + 1)) + 40;
                    verdict = "SUSPICIOUS";
                    threatClass = "suspicious";
                }
                if (lowerPayload.includes(".apk") || lowerPayload.includes("free-money") || lowerPayload.includes("malware") || lowerPayload.includes("phish")) {
                    score = Math.floor(Math.random() * (100 - 76 + 1)) + 76;
                    verdict = "MALICIOUS";
                    threatClass = "malicious";
                }
                if (score === 0) {
                    score = Math.floor(Math.random() * 15);
                }

                // Update UI Display Nodes
                resVerdict.textContent = verdict;
                resScore.textContent = `${score} / 100`;

                statusCard.className = `badge badge-status ${threatClass}`;
                mainPanel.style.borderColor = `var(--${threatClass}-neon)`;

                resultsDisplay.style.display = 'block';
            }, 1200);
        }

        // Reset Pipeline Controls Lifecycle
        function resetToDefault() {
            stopScanner();
            fileInput.value = "";
            previewWrapper.style.display = 'none';
            loadingPipeline.style.display = 'none';
            resultsDisplay.style.display = 'none';
            frontHero.style.display = 'flex';
            actionShelf.style.display = 'grid';
            mainPanel.style.borderColor = 'var(--border-color)';
        }

        resetBtn.addEventListener('click', resetToDefault);
    </script>
</body>
</html>
