<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or "QR Threat Analyzer" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-qrcode"></i> <span>QRShield</span>
            </div>
            <nav class="nav-menu">
                <a href="{{ url_for('home') }}" class="nav-item" id="nav-index"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="{{ url_for('scan_page') }}" class="nav-item" id="nav-scan"><i class="fa-solid fa-shield-virus"></i> Analyze QR</a>
                <a href="{{ url_for('history') }}" class="nav-item" id="nav-history"><i class="fa-solid fa-list-check"></i> Analysis Log</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h1 id="page-title">{{ page_title }}</h1>
                <div class="system-badge secure">
                    <i class="fa-solid fa-circle-check"></i> Core Engine Active
                </div>
            </header>

            <div class="content-body">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
