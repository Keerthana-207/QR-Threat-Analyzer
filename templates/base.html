<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or "QR Threat Analyzer" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --cyber-bg: #0a0a12;
            --cyber-card: #121225;
            --neon-cyan: #00f0ff;
            --neon-pink: #ff0055;
            --neon-green: #39ff14;
            --cyber-text: #adadb8;
        }

        body {
            background-color: var(--cyber-bg) !important;
            color: #ffffff !important;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Cyberpunk Glowing Navbar */
        .navbar-dark {
            background-color: rgba(18, 18, 37, 0.95) !important;
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .navbar-brand {
            font-weight: bold;
            color: var(--neon-cyan) !important;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        /* Glitchy Cyber Card Interface */
        .cyber-panel {
            border: 1px solid var(--neon-cyan) !important;
            border-radius: 4px !important; /* Sharp industrial corners */
            background: var(--cyber-card) !important;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15), inset 0 0 10px rgba(0, 240, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        /* Technical Corner Accents */
        .cyber-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 10px; height: 10px;
            border-top: 2px solid var(--neon-pink); border-left: 2px solid var(--neon-pink);
        }
        .cyber-panel::after {
            content: '';
            position: absolute;
            bottom: 0; right: 0; width: 10px; height: 10px;
            border-bottom: 2px solid var(--neon-pink); border-right: 2px solid var(--neon-pink);
        }

        /* Tech Scan Animation */
        .qr-cyber-container {
            position: relative;
            width: 160px;
            height: 160px;
            padding: 10px;
            background: rgba(0, 240, 255, 0.03);
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .qr-scanner-box {
            position: relative;
            width: 100%;
            height: 100%;
            background: url('https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=Cyberpunk&color=ffffff&bgcolor=121225') no-repeat center;
            background-size: contain;
            filter: drop-shadow(0 0 5px var(--neon-cyan));
        }

        .laser-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, transparent, var(--neon-pink), transparent);
            box-shadow: 0 0 15px var(--neon-pink), 0 0 25px var(--neon-pink);
            animation: advanced-scan 1.5s linear infinite;
        }

        @keyframes advanced-scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        /* Futuristic Interactive Upload Area */
        .drop-zone {
            border: 1px dashed var(--neon-cyan) !important;
            background-color: rgba(10, 10, 18, 0.6);
            color: var(--cyber-text);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--neon-pink) !important;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
            color: #ffffff;
        }

        /* Cyber Nav Action Buttons */
        .btn-cyber {
            background: transparent;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.2);
            transition: all 0.2s ease;
        }
        .btn-cyber:hover {
            background: var(--neon-cyan);
            color: var(--cyber-bg);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .btn-cyber-pink {
            background: rgba(255, 0, 85, 0.1);
            color: var(--neon-pink);
            border: 1px solid var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.2);
        }
        .btn-cyber-pink:hover {
            background: var(--neon-pink);
            color: #ffffff;
            box-shadow: 0 0 25px var(--neon-pink);
        }

        /* Timeline Metrics Stepper styling */
        .step-item {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            opacity: 0.25;
            transition: opacity 0.3s ease;
        }
        .step-item.active {
            opacity: 1;
            color: var(--neon-cyan);
            text-shadow: 0 0 8px var(--neon-cyan);
        }
        .step-icon-wrap {
            width: 40px;
            height: 40px;
            border: 1px solid var(--cyber-text);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
        }
        .step-item.active .step-icon-wrap {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-qrcode"></i> <span>QRShield</span>
            </div>
            <nav class="nav-menu">
                <a href="{{ url_for('home') }}" class="nav-item" id="nav-index"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="{{ url_for('scan_page') }}" class="nav-item" id="nav-scan"><i class="fa-solid fa-shield-virus"></i> Analyze QR</a>
                <a href="{{ url_for('history') }}" class="nav-item" id="nav-history"><i class="fa-solid fa-list-check"></i> Analysis Log</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h1 id="page-title">{{ page_title }}</h1>
                <div class="system-badge secure">
                    <i class="fa-solid fa-circle-check"></i> Core Engine Active
                </div>
            </header>

            <div class="content-body">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
